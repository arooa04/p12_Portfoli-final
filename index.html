<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Aroa Benavent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rosa-fondo: #ffd6d6;
            --verde-forma: #5b6d44;
        }

        body{
            height: 100%;
            width: 100%;
            font-size: 20px;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-section {
            height: 70%;
            background-color: var(--rosa-fondo);
            display: flex;
            position: relative;
            align-items: flex-start;
        }

        .shapes{
            display: flex;
            width: 60%;
            justify-content: space-around;
            height: 100%;
        }

        .shape {
            width: 10rem;
            height: 100%;
            background-color: var(--verde-forma);
            border-radius: 0 90px 0px 90px;
        }

        ul li{
            list-style-type: none;
            flex-direction: column;
            justify-content: space-between; 
        }
        .work-list {
            width: 30%;
            display: flex;
            font-family: "Martian Mono", monospace; 
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }
        a {
            text-decoration: none;
            color: var(--verde-forma);
        }
        .bottom-section {
            height: 30%;
            background-color: var(--verde-forma);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 40px;
        }
        .name , .project-name{
        font-family: "Martian Mono", monospace; 
        font-optical-sizing: auto;
        font-size: 1em;
        font-weight: 400;
        font-style: normal;
        color: var(--rosa-fondo);
        }
        @media only screen and (max-width: 375px) {
            body{
                font-size: 8px;
            }
           .main-container{
            width: 100%;
            flex-direction: column;
           }
           .work-list, .shapes{
            width: 100%;
            height: 50vh;
           }
            .top-section{
                width: 100%;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="top-section">
            <div class="shapes">
                <div class="shape"></div>
                <div class="shape"></div>
                <div class="shape"></div>
            </div>
            <div class="work-list">
                <ul>
                    <li><a href="https://arooa04.github.io/p1/" target="_blank">P1</a></li>
                    <li><a href="https://arooa04.github.io/p2/" target="_blank">P2</a></li>
                    <li><a href="https://arooa04.github.io/p3/" target="_blank">P3</a></li>
                    <li><a href="https://arooa04.github.io/p4/" target="_blank">P4</a></li>
                    <li><a href="https://arooa04.github.io/p5/pages/aroabenavent.html" target="_blank">P5</a></li>
                    <li><a href="https://arooa04.github.io/p5_2/" target="_blank">P5.1</a></li>
                    <li><a href="https://www.figma.com/design/JLfoPTKByc4RSBLzZPVLDt/Untitled?node-id=0-1&t=BZkGYeCB40venMVx-1" target="_blank">P6</a></li>
                    <li><a href="https://www.figma.com/design/kL9MHb5SkAUgMGVbAcOsYK/Portafolio?node-id=22-501&t=FcRKPb8mmUsXgKZe-0" target="_blank">P7</a></li>
                    <li><a href="https://github.com/arooa04/p8_disseny-processing" target="_blank">P8</a></li>
                    <li><a href="https://arooa04.github.io/p9_calendari/" target="_blank">P9</a></li>
                    <li><a href="https://arooa04.github.io/p_9.1-portada-calendari/" target="_blank">P9.1</a></li>
                    <li><a href="https://www.figma.com/design/FgN9G2cwJtS9iOYVUB9B5p/mockups_xxss?node-id=0-1&t=dJ0L3y9Raip1GiXf-1" target="_blank">P10</a></li>
                    <li><a href="https://www.figma.com/design/kL9MHb5SkAUgMGVbAcOsYK/Portafolio?node-id=22-501&t=FcRKPb8mmUsXgKZe-0" target="_blank">P11</a></li>
                    <li><a href="https://www.figma.com/design/kL9MHb5SkAUgMGVbAcOsYK/Portafolio?node-id=22-501&t=FcRKPb8mmUsXgKZe-0" target="_blank">P12</a></li>








                </ul>
                
            </div>
        </div>
    

        <div class="bottom-section">
            <div class="name">
                <p>AROA BENAVENT<br>VAÑÓ 2ºGP</p>
            </div>
            <div class="project-name">
                <p>PORTAFOLIO</p>
            </div>
        </div>
    </div>

</body>
</html>
